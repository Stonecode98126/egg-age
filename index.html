<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鮮雞蛋訂購單</title>
    <script src="https://cdn.tailwindcss.com"></script>
   <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.25);
            --accent-red: #d96c4d;
        }

        * { box-sizing: border-box; }

        body, html {
            min-height: 100%;
            margin: 0;
            font-family: 'Noto Sans TC', sans-serif;
        }

        /* ✅ 修正：改用 pseudo-element 固定背景，相容 iOS Safari */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            /* ✅ 修正：副檔名改為 .png */
            background: url('2222.png') no-repeat center center;
            background-size: 70% auto;
            z-index: -1;
        }
       
        body {
            padding: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 磨砂玻璃 */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(7px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.18);
        }

        .option-btn {
            background: rgba(255, 255, 255, 0.25);
            border: 2px solid transparent;
            transition: all 0.25s ease;
            cursor: pointer;
            width: 100%;
            text-align: left;
        }

        .option-btn:hover {
            background: rgba(255, 255, 255, 0.55);
        }

        .option-btn.selected {
            background: white;
            border-color: var(--accent-red);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(217, 108, 77, 0.2);
        }

        .qty-btn {
            background: rgba(255, 255, 255, 0.25);
            border: 1px solid rgba(0,0,0,0.1);
            transition: all 0.2s;
            cursor: pointer;
            border-radius: 0.75rem;
            font-weight: 700;
            padding: 0.75rem 0;
            flex: 1;
        }

        .qty-btn:hover { background: rgba(255,255,255,0.55); }

        .qty-btn.selected {
            background: var(--accent-red);
            color: white;
            border-color: var(--accent-red);
        }

        .title-font {
            font-family: 'Ma Shan Zheng', cursive;
        }

        /* toast 通知 */
        #toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #333;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 999px;
            font-size: 0.875rem;
            transition: transform 0.3s ease;
            z-index: 999;
            white-space: nowrap;
        }
        #toast.show { transform: translateX(-50%) translateY(0); }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }

        input {
            width: 100%;
            background: rgba(255,255,255,0.45);
            border: 1px solid rgba(0,0,0,0.08);
            padding: 0.75rem;
            border-radius: 0.5rem;
            outline: none;
            font-family: 'Noto Sans TC', sans-serif;
            font-size: 1rem;
            transition: box-shadow 0.2s;
        }
        input:focus {
            box-shadow: 0 0 0 3px rgba(217, 108, 77, 0.25);
            background: rgba(255,255,255,0.9);
        }
    </style>
</head>
<body>

   
<!-- 主要訂購面板 -->
<div class="glass-panel w-full max-w-xl p-6 md:p-10 overflow-y-auto" style="max-height: 92vh;">

    <header class="text-center mb-8">
        <h1 class="text-5xl title-font text-gray-800 mb-2">鮮雞蛋訂購單</h1>
        <p class="text-xs tracking-widest text-gray-500 font-bold uppercase">Fresh Organic Eggs · Order Form</p>
    </header>

    

        <!-- 1. 種類 -->
        <section>
            <p class="font-bold text-gray-700 mb-3 text-base">● 選擇種類</p>
            <div class="grid gap-3">
                <button onclick="selectType('A', 200, '有機白殼蛋 4斤裝')" id="type-A" class="option-btn p-4 rounded-xl flex justify-between items-center bg-blue-30 hover:bg-blue-100 border border-blue-200">
                    <span class="font-medium text-gray-800">A. 有機白殼蛋 4斤裝</span>
                    <span class="font-bold text-blue-700">NT$ 200</span>
                </button>
                <button onclick="selectType('B', 250, '有機紅殼蛋 3.5斤裝')" id="type-B" class="option-btn p-4 rounded-xl flex justify-between items-center bg-amber-32 hover:bg-amber-100 border border-amber-200">
                    <span class="font-medium text-gray-800">B. 有機紅殼蛋 3.5斤裝</span>
                    <span class="font-bold text-amber-1000">NT$ 250</span>
                </button>
                <button onclick="selectType('C', 250, '有機土雞蛋 3斤裝')" id="type-C" class="option-btn p-4 rounded-xl flex justify-between items-center bg-amber-30 hover:bg-amber-100 border border-amber-200">
                    <span class="font-medium text-gray-800">C. 有機土雞蛋 3斤裝</span>
                    <span class="font-bold text-amber-700">NT$ 250</span>
                </button>
            </div>
        </section>
    

        

            <!-- 2. 數量 -->
            <section>
                <p class="font-bold text-gray-700 mb-3 text-base">● 訂購盒數</p>
                <div class="flex gap-2">
                    <button onclick="setQty(1)" class="qty-btn">1</button>
                    <button onclick="setQty(2)" class="qty-btn">2</button>
                    <button onclick="setQty(3)" class="qty-btn">3</button>
                    <button onclick="setQty(4)" class="qty-btn">4</button>
                    <button onclick="setQty(5)" class="qty-btn">5</button>
                </div>
            </section>

            <!-- 3. 總金額 -->
            <div class="rounded-2xl p-4 text-center border-2 border-white" style="background: rgba(255,255,255,0.5);">
                <p class="text-sm text-gray-600 font-bold tracking-wider">總計金額</p>
                <p class="text-7xl font-black text-red-600 mt-1">
                    <small class="text-xl">NT$</small> <span id="total-price">0</span>
                </p>
            </div>

            <!-- 4. 填寫資料 -->
            <section class="space-y-3">
                <p class="font-bold text-gray-700 text-base">● 收件資料</p>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <input type="text" id="name" placeholder="收件人姓名">
                    <input type="tel" id="phone" placeholder="連絡電話">
                </div>
                <input type="email" id="email" placeholder="Gmail 地址（訂單確認用）">

                <button onclick="sendOrder()"
                    class="w-full text-white font-bold py-4 rounded-xl text-xl shadow-lg transition-all duration-200 hover:scale-[1.02] active:scale-[0.98]"
                    style="background: var(--accent-red);">
                    💌 確認訂購（發送郵件）
                </button>

                <!-- ✅ 新增：mailto 備用說明 -->
                <p class="text-center text-xs text-gray-500 leading-relaxed">
                    點擊後會開啟您的郵件程式。若未自動開啟，<br>
                    請直接 Email 至 <strong>ano0828@gmail.com</strong> 完成訂購。
                </p>
            </section>

            <!-- 5. 底部資訊 -->
            <footer class="pt-5 border-t border-gray-200 text-center">
                <p class="text-gray-800 font-bold text-lg">阿澤蛋舖</p>
                <p class="text-gray-600 text-sm">服務專線：0926-741-261</p>
               <div class="mt-4 flex flex-col items-center gap-2">
              <!-- 圖片和連結分開，但都在同一個區域 -->
               <div class="flex gap-3 items-center justify-center">
               <!-- QR Code 圖片區（如果您有自己的 QR 圖） -->
               <img src="ano0828QR.jpg" alt="LINE QR Code" class="w-16 h-16 object-cover rounded-lg shadow-sm">
        
               <!-- 直接加好友按鈕 -->
               <a href="https://line.me/R/ti/p/~ano0828" target="_blank" class="bg-green-500 text-white px-4 py-2 rounded-full text-sm font-bold hover:bg-green-600 transition shadow-md">
               ➕ 加 LINE
        </a>
    </div>
    <span class="text-xs text-gray-500">LINE ID: @ano0828 或點擊按鈕加入</span>
</div>
            </footer>
        </div>
    </div>

    <!-- Toast 通知 -->
    <div id="toast"></div>

    <script>
        let currentPrice = 0;
        let currentName = "";
        let currentQty = 1;

        function selectType(id, price, name) {
            currentPrice = price;
            currentName = name;
            document.querySelectorAll('.option-btn').forEach(btn => btn.classList.remove('selected'));
            document.getElementById('type-' + id).classList.add('selected');
            updateTotal();
        }

        function setQty(q) {
            currentQty = q;
            document.querySelectorAll('.qty-btn').forEach((btn, idx) => {
                btn.classList.toggle('selected', idx + 1 === q);
            });
            updateTotal();
        }

        function updateTotal() {
            document.getElementById('total-price').textContent =
                (currentPrice * currentQty).toLocaleString('zh-TW');
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        function sendOrder() {
            const name  = document.getElementById('name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const email = document.getElementById('email').value.trim();

            if (!currentPrice)         { showToast('⚠️ 請選擇雞蛋種類'); return; }
            if (!name || !phone || !email) { showToast('⚠️ 請填妥姓名、電話及 Gmail'); return; }

            // 基本 email 格式驗證
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                showToast('⚠️ Email 格式不正確'); return;
            }

            const total   = currentPrice * currentQty;
            const subject = encodeURIComponent(`【新訂單】鮮雞蛋訂購 - ${name}`);
            const body    = encodeURIComponent(
                `您好，以下是來自網頁的訂購資訊：\n\n` +
                `訂購人：${name}\n` +
                `電話：${phone}\n` +
                `回覆 Email：${email}\n` +
                `─────────────────\n` +
                `訂購種類：${currentName}\n` +
                `訂購盒數：${currentQty} 盒\n` +
                `應付總額：NT$ ${total.toLocaleString('zh-TW')}\n\n` +
                `請盡速處理並回覆客戶，謝謝！`
            );

            window.location.href = `mailto:ano0828@gmail.com?subject=${subject}&body=${body}`;
        }

        // 預設選中數量 1
        window.onload = () => setQty(1);
    </script>
</body>
</html>
