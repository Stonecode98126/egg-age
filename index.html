<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鮮雞蛋訂購單</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.15);
            --accent-red: #d96c4d;
        }
        * { box-sizing: border-box; }
        body, html { min-height: 100%; margin: 0; font-family: 'Noto Sans TC', sans-serif; }

        /* ✅ 影片背景 — 取代舊的 body::before PNG */
        #bg-video {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover; z-index: -1;
            pointer-events: none;
        }

        body { padding: 1.5rem; display: flex; align-items: center; justify-content: center; }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(7px); -webkit-backdrop-filter: blur(14px);
            border: 1px solid var(--glass-border); border-radius: 24px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.18);
        }
        .option-btn {
            background: rgba(255,255,255,0.25); border: 2px solid transparent;
            transition: all 0.25s ease; cursor: pointer; width: 100%; text-align: left;
        }
        .option-btn:hover { background: rgba(255,255,255,0.55); }
        .option-btn.selected {
            background: white; border-color: var(--accent-red);
            transform: translateY(-2px); box-shadow: 0 4px 12px rgba(217,108,77,0.2);
        }
        .qty-btn {
            background: rgba(255,255,255,0.25); border: 1px solid rgba(0,0,0,0.1);
            transition: all 0.2s; cursor: pointer; border-radius: 0.75rem;
            font-weight: 700; padding: 0.75rem 0; flex: 1;
        }
        .qty-btn:hover { background: rgba(255,255,255,0.55); }
        .qty-btn.selected { background: var(--accent-red); color: white; border-color: var(--accent-red); }
        .title-font { font-family: 'Ma Shan Zheng', cursive; }

        #toast {
            position: fixed; bottom: 2rem; left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #333; color: white; padding: 0.75rem 1.5rem;
            border-radius: 999px; font-size: 0.875rem;
            transition: transform 0.3s ease; z-index: 999; white-space: nowrap;
        }
        #toast.show { transform: translateX(-50%) translateY(0); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }

        .input-wrap { position: relative; }
        .input-wrap input {
            width: 100%;
            background: rgba(255,255,255,0.45);
            border: 1px solid rgba(0,0,0,0.08);
            padding: 0.75rem 2.4rem 0.75rem 0.75rem;
            border-radius: 0.5rem; outline: none;
            font-family: 'Noto Sans TC', sans-serif; font-size: 1rem;
            transition: box-shadow 0.2s, border-color 0.2s;
        }
        .input-wrap input:focus {
            box-shadow: 0 0 0 3px rgba(217,108,77,0.25);
            background: rgba(255,255,255,0.9);
        }
        .input-wrap input.saved {
            border-color: #06C755;
            background: rgba(240,255,244,0.75);
        }
        .clear-btn {
            position: absolute; right: 0.55rem; top: 50%; transform: translateY(-50%);
            background: none; border: none; cursor: pointer;
            color: #bbb; font-size: 0.95rem; padding: 0.2rem;
            display: none; line-height: 1; transition: color 0.15s;
        }
        .input-wrap input.saved ~ .clear-btn { display: block; }
        .clear-btn:hover { color: #d96c4d; }

        #save-bar {
            background: rgba(6,199,85,0.1); border: 1px solid rgba(6,199,85,0.3);
            border-radius: 0.75rem; padding: 0.6rem 1rem;
            display: none; align-items: center; justify-content: space-between; gap: 0.5rem;
        }
        #save-bar.visible { display: flex; }

        .line-btn { background: #06C755; transition: all 0.2s ease; }
        .line-btn:hover { background: #05a847; transform: scale(1.02); }
        .line-btn:active { transform: scale(0.98); }

        .divider {
            display: flex; align-items: center; gap: 0.75rem;
            color: rgba(100,100,100,0.6); font-size: 0.75rem;
        }
        .divider::before, .divider::after {
            content: ''; flex: 1; height: 1px; background: rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<!-- ✅ 影片背景，把 3333.mp4 放在同目錄即可 -->
<video id="bg-video" autoplay loop muted playsinline>
    <source src="3333.mp4" type="video/mp4">
</video>

<div class="glass-panel w-full max-w-xl p-6 md:p-10 overflow-y-auto" style="max-height: 92vh;">

    <header class="text-center mb-8">
        <h1 class="text-5xl title-font text-gray-800 mb-2">鮮雞蛋訂購單</h1>
        <p class="text-xs tracking-widest text-gray-500 font-bold uppercase">Fresh Organic Eggs · Order Form</p>
    </header>

    <div class="space-y-6">

        <!-- 1. 種類 -->
        <section>
            <p class="font-bold text-gray-700 mb-3 text-base">● 選擇種類</p>
            <div class="grid gap-3">
                <button onclick="selectType('A',200,'有機白殼蛋 4斤裝')" id="type-A"
                    class="option-btn p-4 rounded-xl flex justify-between items-center hover:bg-blue-100 border border-blue-200">
                    <span class="font-medium text-gray-800">A. 有機白殼蛋 4斤裝</span>
                    <span class="font-bold text-blue-700">NT$ 200</span>
                </button>
                <button onclick="selectType('B',250,'有機紅殼蛋 3.5斤裝')" id="type-B"
                    class="option-btn p-4 rounded-xl flex justify-between items-center hover:bg-amber-100 border border-amber-200">
                    <span class="font-medium text-gray-800">B. 有機紅殼蛋 3.5斤裝</span>
                    <span class="font-bold text-amber-700">NT$ 250</span>
                </button>
                <button onclick="selectType('C',250,'有機土雞蛋 3斤裝')" id="type-C"
                    class="option-btn p-4 rounded-xl flex justify-between items-center hover:bg-amber-100 border border-amber-200">
                    <span class="font-medium text-gray-800">C. 有機土雞蛋 3斤裝</span>
                    <span class="font-bold text-amber-700">NT$ 250</span>
                </button>
            </div>
        </section>

        <!-- 2. 數量 -->
        <section>
            <p class="font-bold text-gray-700 mb-3 text-base">● 訂購盒數</p>
            <div class="flex gap-2">
                <button onclick="setQty(1)" class="qty-btn">1</button>
                <button onclick="setQty(2)" class="qty-btn">2</button>
                <button onclick="setQty(3)" class="qty-btn">3</button>
                <button onclick="setQty(4)" class="qty-btn">4</button>
                <button onclick="setQty(5)" class="qty-btn">5</button>
            </div>
        </section>

        <!-- 3. 總金額 -->
        <div class="rounded-3xl p-3 text-center border-2 border-white" style="background:rgba(255,255,255,0.5);">
            <p class="text-3xl text-gray-600 font-bold tracking-wider">總計金額</p>
            <p class="text-5xl font-black text-red-600 mt-1">
                <small class="text-2xl">NT$</small> <span id="total-price">0</span>
            </p>
        </div>

        <!-- 4. 收件資料 -->
        <section class="space-y-3">
            <p class="font-bold text-gray-700 text-base">● 收件資料</p>

            <div id="save-bar">
                <span class="text-sm text-green-700 font-medium">✅ 已自動填入上次資料</span>
                <button onclick="clearAllSaved()"
                    class="text-xs text-red-500 hover:text-red-700 font-medium underline whitespace-nowrap">
                    清除記憶
                </button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                <div class="input-wrap">
                    <input type="text" id="name" placeholder="收件人姓名" oninput="onInput('name')">
                    <button class="clear-btn" onclick="clearField('name')" title="清除此欄">✕</button>
                </div>
                <div class="input-wrap">
                    <input type="tel" id="phone" placeholder="連絡電話" oninput="onInput('phone')">
                    <button class="clear-btn" onclick="clearField('phone')" title="清除此欄">✕</button>
                </div>
            </div>
            <div class="input-wrap">
                <input type="email" id="email" placeholder="Gmail 地址（訂單確認用）" oninput="onInput('email')">
                <button class="clear-btn" onclick="clearField('email')" title="清除此欄">✕</button>
            </div>

            <button onclick="sendToLine()"
                class="line-btn w-full text-white font-bold py-4 rounded-xl text-xl shadow-lg flex items-center justify-center gap-2">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2C6.477 2 2 6.045 2 11.077c0 2.704 1.27 5.12 3.27 6.796-.144.521-.925 3.324-.955 3.531 0 0-.017.148.079.205.096.057.208.01.208.01.274-.038 3.172-2.082 3.677-2.424.789.143 1.608.22 2.445.22 5.523 0 10-4.045 10-9.038C22 6.045 17.523 2 12 2z"/>
                </svg>
                傳送訂單到 LINE 接單小哥
            </button>

            <div class="divider">或</div>

            <button onclick="sendOrder()"
                class="w-full text-white font-bold py-4 rounded-xl text-xl shadow-lg transition-all duration-200 hover:scale-[1.02] active:scale-[0.98]"
                style="background: var(--accent-red);">
                💌 確認訂購（發送郵件）
            </button>

            <p class="text-center text-xs text-gray-500 leading-relaxed">
                LINE 按鈕會自動帶入訂單內容，確認後按送出即完成。<br>
                或直接 Email 至 <strong>ano0828@gmail.com</strong> 完成訂購。
            </p>
        </section>

        <!-- 5. 底部資訊 -->
        <footer class="pt-5 border-t border-gray-200 text-center">
            <p class="text-gray-800 font-bold text-lg">阿澤蛋舖</p>
            <p class="text-gray-600 text-sm">服務專線：0926-741-261</p>
            <div class="mt-4 flex flex-col items-center gap-2">
                <div class="flex gap-3 items-center justify-center">
                    <img src="ano0828QR.jpg" alt="LINE QR Code" class="w-16 h-16 object-cover rounded-lg shadow-sm">
                    <a href="https://line.me/R/ti/p/~ano0828" target="_blank"
                        class="bg-green-500 text-white px-4 py-2 rounded-full text-sm font-bold hover:bg-green-600 transition shadow-md">
                        ➕ 加 LINE
                    </a>
                </div>
                <span class="text-xs text-gray-500">LINE ID: @ano0828 或點擊按鈕加入</span>
            </div>
        </footer>

    </div>
</div>

<div id="toast"></div>

<script>
    let currentPrice = 0;
    let currentName  = "";
    let currentQty   = 1;

    const KEYS = { name: 'egg_name', phone: 'egg_phone', email: 'egg_email' };

    window.onload = () => {
        setQty(1);
        let anyLoaded = false;
        ['name','phone','email'].forEach(f => {
            const saved = localStorage.getItem(KEYS[f]);
            if (saved) {
                const el = document.getElementById(f);
                el.value = saved;
                el.classList.add('saved');
                anyLoaded = true;
            }
        });
        if (anyLoaded) document.getElementById('save-bar').classList.add('visible');
    };

    function onInput(field) {
        const el  = document.getElementById(field);
        const val = el.value.trim();
        if (val) {
            localStorage.setItem(KEYS[field], val);
            el.classList.add('saved');
        } else {
            localStorage.removeItem(KEYS[field]);
            el.classList.remove('saved');
        }
        updateSaveBar();
    }

    function updateSaveBar() {
        const any = ['name','phone','email'].some(f => localStorage.getItem(KEYS[f]));
        document.getElementById('save-bar').classList.toggle('visible', any);
    }

    function clearField(field) {
        const el = document.getElementById(field);
        el.value = '';
        el.classList.remove('saved');
        localStorage.removeItem(KEYS[field]);
        updateSaveBar();
    }

    function clearAllSaved() {
        ['name','phone','email'].forEach(f => {
            document.getElementById(f).value = '';
            document.getElementById(f).classList.remove('saved');
            localStorage.removeItem(KEYS[f]);
        });
        document.getElementById('save-bar').classList.remove('visible');
        showToast('✅ 已清除所有記憶資料');
    }

    function selectType(id, price, name) {
        currentPrice = price; currentName = name;
        document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
        document.getElementById('type-' + id).classList.add('selected');
        updateTotal();
    }
    function setQty(q) {
        currentQty = q;
        document.querySelectorAll('.qty-btn').forEach((b,i) => b.classList.toggle('selected', i+1===q));
        updateTotal();
    }
    function updateTotal() {
        document.getElementById('total-price').textContent = (currentPrice*currentQty).toLocaleString('zh-TW');
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg; t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    function getTaiwanTime() {
        const tw  = new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Taipei' }));
        const pad = n => String(n).padStart(2,'0');
        return `${tw.getFullYear()}/${pad(tw.getMonth()+1)}/${pad(tw.getDate())} ${pad(tw.getHours())}:${pad(tw.getMinutes())}`;
    }

    function validateForm() {
        const name  = document.getElementById('name').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const email = document.getElementById('email').value.trim();
        if (!currentPrice)             { showToast('⚠️ 請選擇雞蛋種類'); return null; }
        if (!name||!phone||!email)     { showToast('⚠️ 請填妥姓名、電話及 Gmail'); return null; }
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showToast('⚠️ Email 格式不正確'); return null; }
        localStorage.setItem(KEYS.name,  name);
        localStorage.setItem(KEYS.phone, phone);
        localStorage.setItem(KEYS.email, email);
        return { name, phone, email };
    }

    function sendToLine() {
        const data = validateForm(); if (!data) return;
        const { name, phone, email } = data;
        const total = currentPrice * currentQty;
        const msg =
            `【阿澤蛋舖 新訂單】\n` +
            `━━━━━━━━━━━━\n` +
            `🕐 訂購時間：${getTaiwanTime()}\n` +
            `👤 訂購人：${name}\n` +
            `📞 電話：${phone}\n` +
            `📧 Email：${email}\n` +
            `━━━━━━━━━━━━\n` +
            `🥚 種類：${currentName}\n` +
            `📦 盒數：${currentQty} 盒\n` +
            `💰 總額：NT$ ${total.toLocaleString('zh-TW')}\n` +
            `━━━━━━━━━━━━\n` +
            `請確認後回覆客戶，謝謝！`;
        window.open(`https://line.me/R/oaMessage/@942ecqsm/?text=${encodeURIComponent(msg)}`, '_blank');
    }

    function sendOrder() {
        const data = validateForm(); if (!data) return;
        const { name, phone, email } = data;
        const total   = currentPrice * currentQty;
        const subject = encodeURIComponent(`【新訂單】鮮雞蛋訂購 - ${name}`);
        const body    = encodeURIComponent(
            `您好，以下是來自網頁的訂購資訊：\n\n` +
            `訂購時間：${getTaiwanTime()}\n` +
            `訂購人：${name}\n電話：${phone}\n回覆 Email：${email}\n` +
            `─────────────────\n` +
            `訂購種類：${currentName}\n訂購盒數：${currentQty} 盒\n` +
            `應付總額：NT$ ${total.toLocaleString('zh-TW')}\n\n` +
            `請盡速處理並回覆客戶，謝謝！`
        );
        window.location.href = `mailto:ano0828@gmail.com?subject=${subject}&body=${body}`;
    }
</script>
</body>
</html>
